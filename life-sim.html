<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Life Simulator</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; color: #c8d4c0; font-family: 'Courier New', monospace; overflow: hidden; width: 100vw; height: 100vh; user-select: none; }
  #canvas { position: absolute; top: 0; left: 0; cursor: crosshair; }
  #bloom-canvas { position: absolute; top: 0; left: 0; pointer-events: none; }
  #hud { position: absolute; top: 16px; left: 16px; pointer-events: none; z-index: 10; }
  .hud-title { font-size: 10px; letter-spacing: 0.25em; color: #3a5c3a; text-transform: uppercase; margin-bottom: 8px; }
  .hud-stat { font-size: 11px; color: #4a7a4a; line-height: 1.8; }
  .hud-stat span { color: #8ab88a; }
  #controls { position: absolute; bottom: 16px; left: 16px; z-index: 10; display: flex; gap: 6px; flex-direction: column; }
  .ctrl-group { display: flex; gap: 5px; flex-wrap: wrap; }
  .mode-label { font-size: 9px; color: #3a5a3a; text-transform: uppercase; letter-spacing: 0.15em; margin-bottom: 2px; }
  button { background: rgba(20,40,20,0.7); border: 1px solid #2a4a2a; color: #6a9a6a; font-family: 'Courier New', monospace; font-size: 10px; letter-spacing: 0.08em; padding: 5px 9px; cursor: pointer; transition: all 0.12s; text-transform: uppercase; }
  button:hover { background: rgba(30,60,30,0.9); border-color: #4a8a4a; color: #aadaaa; }
  button.active { background: rgba(40,80,40,0.9); border-color: #6aaa6a; color: #cceecc; }
  body.lightfield button { background: rgba(220,235,220,0.75); border-color: #8aaa8a; color: #2a5a2a; }
  body.lightfield button:hover { background: rgba(200,225,200,0.9); }
  body.lightfield button.active { background: rgba(160,200,160,0.9); border-color: #4a8a4a; color: #0a3a0a; }
  body.lightfield .hud-stat { color: #2a5a2a; }
  body.lightfield .hud-stat span { color: #0a3a0a; }
  body.lightfield .hud-title { color: #2a5a2a; }
  #inspector { position: absolute; top: 16px; right: 16px; width: 210px; background: rgba(5,12,5,0.88); border: 1px solid #1a3a1a; padding: 12px; z-index: 10; display: none; }
  body.lightfield #inspector { background: rgba(240,248,240,0.92); border-color: #8aaa8a; }
  .inspector-title { font-size: 9px; letter-spacing: 0.2em; color: #3a6a3a; text-transform: uppercase; margin-bottom: 8px; border-bottom: 1px solid #1a3a1a; padding-bottom: 5px; }
  .inspector-row { font-size: 10px; color: #4a7a4a; line-height: 1.9; display: flex; justify-content: space-between; }
  .inspector-row span { color: #8ab88a; }
  .genome-display { margin-top: 8px; font-size: 9px; color: #3a5a3a; letter-spacing: 0.08em; word-break: break-all; line-height: 1.7; }
  #tip { position: absolute; bottom: 16px; right: 16px; font-size: 9px; color: #2a4a2a; text-align: right; line-height: 1.8; pointer-events: none; }
  #field-toggle { position: absolute; top: 16px; left: 50%; transform: translateX(-50%); z-index: 20; display: flex; }
  #field-toggle button { font-size: 9px; letter-spacing: 0.15em; padding: 4px 14px; }
  #field-toggle button:first-child { border-right: none; }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<canvas id="bloom-canvas"></canvas>

<div id="hud">
  <div class="hud-title">Life / 0.2</div>
  <div class="hud-stat">Cells <span id="stat-cells">0</span></div>
  <div class="hud-stat">Colonies <span id="stat-colonies">0</span></div>
  <div class="hud-stat">Nutrients <span id="stat-nuts">0</span></div>
  <div class="hud-stat">Generation <span id="stat-gen">0</span></div>
  <div class="hud-stat">Species <span id="stat-species">0</span></div>
  <div class="hud-stat">Tick <span id="stat-tick">0</span></div>
</div>

<div id="field-toggle">
  <button id="btn-dark" class="active" onclick="setField('dark')">Dark field</button>
  <button id="btn-light" onclick="setField('light')">Light field</button>
</div>

<div id="inspector">
  <div class="inspector-title">Cell Inspector</div>
  <div class="inspector-row">Energy <span id="ins-energy">-</span></div>
  <div class="inspector-row">Age <span id="ins-age">-</span></div>
  <div class="inspector-row">Generation <span id="ins-gen">-</span></div>
  <div class="inspector-row">Shape <span id="ins-shape">-</span></div>
  <div class="inspector-row">Adhesion <span id="ins-adh">-</span></div>
  <div class="inspector-row">Metabolism <span id="ins-meta">-</span></div>
  <div class="inspector-row">Colony size <span id="ins-cluster">-</span></div>
  <div class="genome-display" id="ins-genome"></div>
</div>

<div id="controls">
  <div class="mode-label">Mode</div>
  <div class="ctrl-group">
    <button id="btn-observe" class="active" onclick="setMode('observe')">Observe</button>
    <button id="btn-seed" onclick="setMode('seed')">Seed</button>
    <button id="btn-inject" onclick="setMode('inject')">Nutrients</button>
    <button id="btn-kill" onclick="setMode('kill')">Kill</button>
  </div>
  <div class="ctrl-group">
    <button onclick="togglePause()" id="btn-pause">Pause</button>
    <button onclick="stepOnce()">Step</button>
    <button onclick="resetSim()">Reset</button>
    <button onclick="addCluster()">+ Cluster</button>
  </div>
  <div class="ctrl-group">
    <button onclick="setSpeed(0.5)" id="btn-slow">0.5x</button>
    <button onclick="setSpeed(1)" id="btn-normal" class="active">1x</button>
    <button onclick="setSpeed(3)" id="btn-fast">3x</button>
    <button onclick="setSpeed(8)" id="btn-vfast">8x</button>
  </div>
</div>

<div id="tip">scroll to zoom &nbsp;|&nbsp; drag to pan<br>click cell to inspect</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const bloomCanvas = document.getElementById('bloom-canvas');
const bloomCtx = bloomCanvas.getContext('2d');

let W, H;
function resize() { W = canvas.width = bloomCanvas.width = window.innerWidth; H = canvas.height = bloomCanvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

const WORLD_W = 3200, WORLD_H = 3200;
let vx = WORLD_W/2, vy = WORLD_H/2, vscale = 1.0;
let isDragging = false, dragStartX, dragStartY, dragVX, dragVY;
let cells = [], nutrients = [], tick = 0, maxGen = 0;
let paused = false, simSpeed = 1, mode = 'observe', selectedCell = null;
let fieldMode = 'dark';

// Genome (16 bits):
// 0-1: adhesion type (0=none, 1-3=A/B/C)
// 2-3: metabolism rate
// 4-5: size
// 6:   photosynthesis
// 7:   flagella
// 8-9: division threshold
// 10:  chemotaxis
// 11:  toxin
// 12-13: shape (0=round,1=elongated,2=spiky,3=irregular)
// 14-15: lineage

const SHAPE_NAMES = ['round','elongated','spiky','irregular'];

function getBits(g,s,l) { return (g>>s)&((1<<l)-1); }
function getBit(g,n) { return (g>>n)&1; }

function traitsFrom(genome) {
  return {
    adhesion: getBits(genome,0,2),
    metabolism: [0.28,0.55,0.95,1.5][getBits(genome,2,2)],
    radius: [4,6,8.5,12][getBits(genome,4,2)],
    photo: getBit(genome,6),
    flagella: getBit(genome,7),
    divisionEnergy: [80,120,170,230][getBits(genome,8,2)],
    chemotaxis: getBit(genome,10),
    toxin: getBit(genome,11),
    shape: getBits(genome,12,2),
    lineage: getBits(genome,14,2)
  };
}

function mutate(genome) {
  let g = genome;
  for (let i=0;i<16;i++) if (Math.random()<0.018) g^=(1<<i);
  return g;
}

function buildShapePoints(shapeIdx, radius, genome) {
  if (shapeIdx===0) return null;
  const pts=[];
  if (shapeIdx===1) {
    for (let i=0;i<12;i++) { const a=(i/12)*Math.PI*2; pts.push({x:Math.cos(a)*radius*1.1,y:Math.sin(a)*radius*0.6}); }
    return pts;
  }
  if (shapeIdx===2) {
    const spikes=5+(genome&3);
    for (let i=0;i<spikes*2;i++) { const a=(i/(spikes*2))*Math.PI*2; const r=i%2===0?radius*1.55:radius*0.5; pts.push({x:Math.cos(a)*r,y:Math.sin(a)*r}); }
    return pts;
  }
  if (shapeIdx===3) {
    const sides=7+(genome&3);
    for (let i=0;i<sides;i++) { const a=(i/sides)*Math.PI*2+((genome>>i)&1)*0.28; const r=radius*(0.65+0.65*Math.abs(Math.sin(i*1.8+genome*0.01))); pts.push({x:Math.cos(a)*r,y:Math.sin(a)*r}); }
    return pts;
  }
  return null;
}

function makeCell(x,y,genome,generation) {
  genome = genome!==undefined ? genome : (Math.random()*65536)|0;
  const traits=traitsFrom(genome);
  return { x,y, vx:(Math.random()-0.5)*0.4, vy:(Math.random()-0.5)*0.4, genome, traits, shapePoints:buildShapePoints(traits.shape,traits.radius,genome), energy:traits.divisionEnergy*0.5, age:0, generation:generation||0, bonds:[], alive:true, phase:Math.random()*Math.PI*2, rotation:Math.random()*Math.PI*2, rotVel:(Math.random()-0.5)*0.02, id:Math.random() };
}

function makeNutrient(x,y) {
  return { x:x!==undefined?x:Math.random()*WORLD_W, y:y!==undefined?y:Math.random()*WORLD_H, energy:8+Math.random()*12, alive:true, drift:(Math.random()-0.5)*0.25 };
}

const GRID=64;
function buildGrid(arr,gx,gy) {
  const m=new Map();
  for (const e of arr) { const k=(Math.floor(gx(e)/GRID)*10000)+Math.floor(gy(e)/GRID); if(!m.has(k))m.set(k,[]); m.get(k).push(e); }
  return m;
}
function nearby(grid,x,y,r) {
  const out=[];
  const x0=Math.floor((x-r)/GRID),x1=Math.floor((x+r)/GRID),y0=Math.floor((y-r)/GRID),y1=Math.floor((y+r)/GRID);
  for (let gx=x0;gx<=x1;gx++) for (let gy=y0;gy<=y1;gy++) { const b=grid.get(gx*10000+gy); if(b) for (const e of b) out.push(e); }
  return out;
}

function initSim() {
  cells=[]; nutrients=[]; tick=0; maxGen=0;
  for (let i=0;i<900;i++) nutrients.push(makeNutrient());
  const cx=WORLD_W/2,cy=WORLD_H/2;
  for (let i=0;i<14;i++) { const a=(i/14)*Math.PI*2,r=100+Math.random()*60; cells.push(makeCell(cx+Math.cos(a)*r,cy+Math.sin(a)*r)); }
}

function addCluster() {
  const cx=vx+(Math.random()-0.5)*200/vscale, cy=vy+(Math.random()-0.5)*200/vscale;
  const base=(Math.random()*65536)|0;
  for (let i=0;i<8;i++) { const a=(i/8)*Math.PI*2; cells.push(makeCell(cx+Math.cos(a)*40,cy+Math.sin(a)*40,mutate(base),0)); }
}

function getColony(cell) {
  const vis=new Set(),q=[cell];
  while(q.length){const c=q.pop();if(vis.has(c))continue;vis.add(c);for(const b of c.bonds)if(b.alive&&!vis.has(b))q.push(b);}
  return vis;
}

function stepSim() {
  tick++;
  for (const n of nutrients) {
    n.x+=n.drift+(Math.random()-0.5)*0.35; n.y+=(Math.random()-0.5)*0.35;
    n.x=Math.max(10,Math.min(WORLD_W-10,n.x)); n.y=Math.max(10,Math.min(WORLD_H-10,n.y));
  }
  if (nutrients.length<1300&&Math.random()<0.4) nutrients.push(makeNutrient());

  const nutGrid=buildGrid(nutrients.filter(n=>n.alive),n=>n.x,n=>n.y);
  const cellGrid=buildGrid(cells.filter(c=>c.alive),c=>c.x,c=>c.y);
  const newCells=[];

  for (const cell of cells) {
    if (!cell.alive) continue;
    const t=cell.traits;
    cell.age++; cell.phase+=0.04; cell.rotation+=cell.rotVel;
    cell.vx+=(Math.random()-0.5)*0.12; cell.vy+=(Math.random()-0.5)*0.12;

    if (t.chemotaxis) {
      const ns=nearby(nutGrid,cell.x,cell.y,130); let bd=Infinity,bn=null;
      for (const n of ns) { if(!n.alive)continue; const d2=(n.x-cell.x)**2+(n.y-cell.y)**2; if(d2<bd){bd=d2;bn=n;} }
      if (bn) { const d=Math.sqrt(bd); cell.vx+=(bn.x-cell.x)/d*0.09; cell.vy+=(bn.y-cell.y)/d*0.09; }
    }

    for (const b of cell.bonds) {
      if (!b.alive) continue;
      const dx=b.x-cell.x,dy=b.y-cell.y,d=Math.sqrt(dx*dx+dy*dy);
      const target=(t.radius+b.traits.radius)*1.1,force=(d-target)*0.04;
      cell.vx+=(dx/d)*force; cell.vy+=(dy/d)*force;
    }

    const maxSpd=t.flagella?1.6:0.9;
    const spd=Math.sqrt(cell.vx**2+cell.vy**2);
    if (spd>maxSpd){cell.vx*=maxSpd/spd;cell.vy*=maxSpd/spd;}
    cell.x+=cell.vx; cell.y+=cell.vy;
    if(cell.x<20){cell.x=20;cell.vx*=-0.5;} if(cell.x>WORLD_W-20){cell.x=WORLD_W-20;cell.vx*=-0.5;}
    if(cell.y<20){cell.y=20;cell.vy*=-0.5;} if(cell.y>WORLD_H-20){cell.y=WORLD_H-20;cell.vy*=-0.5;}

    const neighbours=nearby(cellGrid,cell.x,cell.y,t.radius*3.5);
    cell.bonds=[];
    for (const other of neighbours) {
      if (other===cell||!other.alive) continue;
      const dx=other.x-cell.x,dy=other.y-cell.y,d=Math.sqrt(dx*dx+dy*dy);
      const minD=t.radius+other.traits.radius;
      if (d<minD*1.2&&d>0.01) {
        if (t.adhesion>0&&t.adhesion===other.traits.adhesion&&d<minD*1.15) cell.bonds.push(other);
        else if (d<minD){cell.vx-=(dx/d)*(minD-d)*0.18;cell.vy-=(dy/d)*(minD-d)*0.18;}
      }
    }

    const ns2=nearby(nutGrid,cell.x,cell.y,t.radius+14);
    for (const n of ns2) { if(!n.alive)continue; if(Math.sqrt((n.x-cell.x)**2+(n.y-cell.y)**2)<t.radius+8){cell.energy+=n.energy*t.metabolism;n.alive=false;} }

    if (t.photo) cell.energy+=0.06;
    cell.energy-=t.metabolism*t.radius*0.013+0.04;

    if (t.toxin) {
      for (const other of neighbours) {
        if (other===cell||!other.alive)continue;
        if (Math.sqrt((other.x-cell.x)**2+(other.y-cell.y)**2)<t.radius*2.5) other.energy-=0.07;
      }
    }

    if (cell.energy<=0||cell.age>3500) {
      cell.alive=false;
      const rel=Math.floor(Math.max(0,cell.energy+t.radius)/8);
      for (let r=0;r<Math.min(rel+2,6);r++) nutrients.push(makeNutrient(cell.x+(Math.random()-0.5)*22,cell.y+(Math.random()-0.5)*22));
      if (selectedCell===cell) selectedCell=null;
      continue;
    }

    if (cell.energy>=t.divisionEnergy&&cells.length+newCells.length<1800) {
      const angle=Math.random()*Math.PI*2,sep=t.radius*2.3;
      const cg=mutate(cell.genome),cGen=cell.generation+1;
      if (cGen>maxGen) maxGen=cGen;
      const child=makeCell(cell.x+Math.cos(angle)*sep,cell.y+Math.sin(angle)*sep,cg,cGen);
      child.energy=cell.energy*0.45; cell.energy*=0.45;
      newCells.push(child);
    }
    if (cell.energy>t.divisionEnergy*1.5) cell.energy=t.divisionEnergy*1.5;
  }

  cells.push(...newCells);
  cells=cells.filter(c=>c.alive);
  nutrients=nutrients.filter(n=>n.alive);
}

function worldToScreen(wx,wy){return[(wx-vx)*vscale+W/2,(wy-vy)*vscale+H/2];}
function screenToWorld(sx,sy){return[(sx-W/2)/vscale+vx,(sy-H/2)/vscale+vy];}

function drawShape(c2d,cell,sx,sy,sr) {
  const t=cell.traits;
  if (t.shape===0||!cell.shapePoints){c2d.beginPath();c2d.arc(sx,sy,sr,0,Math.PI*2);return;}
  const pts=cell.shapePoints,rot=cell.rotation,scale=sr/t.radius;
  c2d.beginPath();
  for (let i=0;i<pts.length;i++) {
    const p=pts[i],rx=p.x*Math.cos(rot)-p.y*Math.sin(rot),ry=p.x*Math.sin(rot)+p.y*Math.cos(rot);
    if(i===0)c2d.moveTo(sx+rx*scale,sy+ry*scale); else c2d.lineTo(sx+rx*scale,sy+ry*scale);
  }
  c2d.closePath();
}

function drawColonyMembrane(c2d,colony,fm) {
  if (colony.size<2) return;
  const members=[...colony];
  let cx=0,cy=0;
  for (const m of members){cx+=m.x;cy+=m.y;}
  cx/=members.length;cy/=members.length;
  const [scx,scy]=worldToScreen(cx,cy);

  const pts=members.map(m=>{
    const[sx,sy]=worldToScreen(m.x,m.y);
    const angle=Math.atan2(sy-scy,sx-scx);
    const sr=m.traits.radius*vscale;
    return{sx:sx+Math.cos(angle)*sr*0.5,sy:sy+Math.sin(angle)*sr*0.5,angle};
  });
  pts.sort((a,b)=>a.angle-b.angle);
  if (pts.length<2) return;

  const hue=(members[0].traits.lineage/4)*360;
  c2d.beginPath();
  c2d.moveTo(pts[0].sx,pts[0].sy);
  for (let i=1;i<=pts.length;i++) { const p=pts[i%pts.length]; c2d.lineTo(p.sx,p.sy); }
  c2d.closePath();

  if (fm==='dark') {
    c2d.strokeStyle=`hsla(${hue},50%,65%,0.2)`;c2d.lineWidth=1.5;c2d.setLineDash([3,5]);c2d.stroke();c2d.setLineDash([]);
    c2d.fillStyle=`hsla(${hue},40%,30%,0.05)`;c2d.fill();
  } else {
    c2d.strokeStyle=`hsla(${hue},60%,25%,0.18)`;c2d.lineWidth=1;c2d.setLineDash([3,5]);c2d.stroke();c2d.setLineDash([]);
    c2d.fillStyle=`hsla(${hue},40%,65%,0.07)`;c2d.fill();
  }
}

function drawDarkField() {
  ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);
  const vg=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.max(W,H)*0.75);
  vg.addColorStop(0,'rgba(0,5,3,0)');vg.addColorStop(1,'rgba(0,0,0,0.6)');
  ctx.fillStyle=vg;ctx.fillRect(0,0,W,H);

  for (const n of nutrients) {
    const[sx,sy]=worldToScreen(n.x,n.y);
    if(sx<-4||sx>W+4||sy<-4||sy>H+4)continue;
    ctx.beginPath();ctx.arc(sx,sy,Math.max(0.7,vscale*1.4),0,Math.PI*2);
    ctx.fillStyle=`rgba(100,200,130,${0.22+Math.random()*0.18})`;ctx.fill();
  }

  // Colony membranes
  const drawnC=new Set();
  for (const cell of cells) {
    if (cell.bonds.length===0) continue;
    const col=getColony(cell);if(col.size<2)continue;
    const key=[...col].map(c=>c.id.toFixed(6)).sort().join(',');
    if(drawnC.has(key))continue;drawnC.add(key);
    drawColonyMembrane(ctx,col,'dark');
  }

  // Bloom pass 1 - wide diffuse
  bloomCtx.clearRect(0,0,W,H);
  for (const cell of cells) {
    const[sx,sy]=worldToScreen(cell.x,cell.y);
    if(sx<-100||sx>W+100||sy<-100||sy>H+100)continue;
    const t=cell.traits,sr=t.radius*vscale,ef=Math.min(1,cell.energy/t.divisionEnergy);
    const hue=(t.lineage/4)*360,sat=50+t.metabolism*18,lit=40+ef*22;
    const br=sr*(4+ef*2);
    const bg=bloomCtx.createRadialGradient(sx,sy,0,sx,sy,br);
    bg.addColorStop(0,`hsla(${hue},${sat}%,${lit}%,0.25)`);
    bg.addColorStop(0.25,`hsla(${hue},${sat}%,${lit}%,0.12)`);
    bg.addColorStop(0.55,`hsla(${hue},${sat}%,${lit}%,0.05)`);
    bg.addColorStop(1,`hsla(${hue},${sat}%,${lit}%,0)`);
    bloomCtx.beginPath();bloomCtx.arc(sx,sy,br,0,Math.PI*2);bloomCtx.fillStyle=bg;bloomCtx.fill();
  }
  ctx.globalCompositeOperation='screen';ctx.drawImage(bloomCanvas,0,0);ctx.globalCompositeOperation='source-over';

  // Draw cells
  for (const cell of cells) {
    const[sx,sy]=worldToScreen(cell.x,cell.y);
    if(sx<-60||sx>W+60||sy<-60||sy>H+60)continue;
    const t=cell.traits,sr=t.radius*vscale,ef=Math.min(1,cell.energy/t.divisionEnergy);
    const hue=(t.lineage/4)*360,sat=50+t.metabolism*18,lit=40+ef*22;

    // Inner glow
    const ig=ctx.createRadialGradient(sx,sy,0,sx,sy,sr*1.7);
    ig.addColorStop(0,`hsla(${hue},${sat}%,${lit+12}%,0.4)`);
    ig.addColorStop(0.4,`hsla(${hue},${sat}%,${lit}%,0.15)`);
    ig.addColorStop(1,`hsla(${hue},${sat}%,${lit}%,0)`);
    ctx.beginPath();ctx.arc(sx,sy,sr*1.7,0,Math.PI*2);ctx.fillStyle=ig;ctx.fill();

    // Body
    drawShape(ctx,cell,sx,sy,sr);
    ctx.fillStyle=`hsla(${hue},18%,7%,0.9)`;ctx.fill();

    // Bright rim
    drawShape(ctx,cell,sx,sy,sr);
    ctx.strokeStyle=`hsla(${hue},${sat+20}%,${lit+45}%,0.94)`;
    ctx.lineWidth=Math.max(0.6,sr*0.17);ctx.stroke();

    // Secondary rim
    if (sr>4) {
      drawShape(ctx,cell,sx,sy,sr*0.86);
      ctx.strokeStyle=`hsla(${hue},${sat}%,${lit+28}%,0.2)`;
      ctx.lineWidth=Math.max(0.3,sr*0.09);ctx.stroke();
    }

    // Nucleus
    if (sr>5) {
      ctx.beginPath();ctx.arc(sx+Math.sin(cell.phase*0.6)*sr*0.14,sy+Math.cos(cell.phase*0.6)*sr*0.14,sr*0.3,0,Math.PI*2);
      ctx.strokeStyle=`hsla(${hue},40%,${lit+28}%,0.38)`;ctx.lineWidth=Math.max(0.3,sr*0.07);ctx.stroke();
    }

    // Flagella
    if (t.flagella&&sr>4) {
      ctx.beginPath();ctx.moveTo(sx,sy);
      ctx.quadraticCurveTo(sx+Math.cos(cell.phase+0.9)*sr,sy+Math.sin(cell.phase+0.9)*sr,sx+Math.cos(cell.phase*1.8)*sr*3.2,sy+Math.sin(cell.phase*1.8)*sr*0.9);
      ctx.strokeStyle=`hsla(${hue},40%,65%,0.28)`;ctx.lineWidth=Math.max(0.3,sr*0.07);ctx.stroke();
    }

    if (t.photo){drawShape(ctx,cell,sx,sy,sr*0.74);ctx.fillStyle='rgba(40,200,70,0.07)';ctx.fill();}

    if (cell===selectedCell){ctx.beginPath();ctx.arc(sx,sy,sr+4,0,Math.PI*2);ctx.strokeStyle='rgba(255,255,200,0.75)';ctx.lineWidth=1;ctx.setLineDash([3,3]);ctx.stroke();ctx.setLineDash([]);}
  }

  // Bloom pass 2 - tight hot glow (screen blend)
  bloomCtx.clearRect(0,0,W,H);
  for (const cell of cells) {
    const[sx,sy]=worldToScreen(cell.x,cell.y);
    if(sx<-60||sx>W+60||sy<-60||sy>H+60)continue;
    const t=cell.traits,sr=t.radius*vscale;
    const hue=(t.lineage/4)*360,sat=65,lit=58;
    const br=sr*1.5;
    const b2=bloomCtx.createRadialGradient(sx,sy,0,sx,sy,br);
    b2.addColorStop(0,`hsla(${hue},${sat}%,${lit}%,0.55)`);
    b2.addColorStop(0.35,`hsla(${hue},${sat}%,${lit}%,0.22)`);
    b2.addColorStop(1,`hsla(${hue},${sat}%,${lit}%,0)`);
    bloomCtx.beginPath();bloomCtx.arc(sx,sy,br,0,Math.PI*2);bloomCtx.fillStyle=b2;bloomCtx.fill();
  }
  ctx.globalCompositeOperation='screen';ctx.globalAlpha=0.65;ctx.drawImage(bloomCanvas,0,0);ctx.globalAlpha=1;ctx.globalCompositeOperation='source-over';
}

function drawLightField() {
  ctx.fillStyle='#e8eeea';ctx.fillRect(0,0,W,H);
  const vg=ctx.createRadialGradient(W/2,H/2,Math.min(W,H)*0.3,W/2,H/2,Math.max(W,H)*0.7);
  vg.addColorStop(0,'rgba(0,0,0,0)');vg.addColorStop(1,'rgba(0,0,0,0.1)');
  ctx.fillStyle=vg;ctx.fillRect(0,0,W,H);

  for (const n of nutrients) {
    const[sx,sy]=worldToScreen(n.x,n.y);
    if(sx<-4||sx>W+4||sy<-4||sy>H+4)continue;
    ctx.beginPath();ctx.arc(sx,sy,Math.max(0.8,vscale*1.3),0,Math.PI*2);
    ctx.fillStyle='rgba(70,150,90,0.35)';ctx.fill();
  }

  const drawnC=new Set();
  for (const cell of cells) {
    if (cell.bonds.length===0) continue;
    const col=getColony(cell);if(col.size<2)continue;
    const key=[...col].map(c=>c.id.toFixed(6)).sort().join(',');
    if(drawnC.has(key))continue;drawnC.add(key);
    drawColonyMembrane(ctx,col,'light');
  }

  for (const cell of cells) {
    const[sx,sy]=worldToScreen(cell.x,cell.y);
    if(sx<-60||sx>W+60||sy<-60||sy>H+60)continue;
    const t=cell.traits,sr=t.radius*vscale,ef=Math.min(1,cell.energy/t.divisionEnergy);
    const hue=(t.lineage/4)*360,sat=55,darkLit=10+ef*14;

    // Diffraction halo
    const hr=sr*1.55;
    const hg=ctx.createRadialGradient(sx,sy,sr*0.75,sx,sy,hr);
    hg.addColorStop(0,`hsla(${hue},${sat}%,${darkLit}%,0.12)`);
    hg.addColorStop(0.5,`hsla(${hue},${sat}%,${darkLit}%,0.05)`);
    hg.addColorStop(1,`hsla(${hue},${sat}%,${darkLit}%,0)`);
    ctx.beginPath();ctx.arc(sx,sy,hr,0,Math.PI*2);ctx.fillStyle=hg;ctx.fill();

    // Body absorbs light
    drawShape(ctx,cell,sx,sy,sr);
    ctx.fillStyle=`hsla(${hue},${sat}%,${darkLit+6}%,0.52)`;ctx.fill();

    // Membrane
    drawShape(ctx,cell,sx,sy,sr);
    ctx.strokeStyle=`hsla(${hue},${sat+10}%,${darkLit}%,0.88)`;
    ctx.lineWidth=Math.max(0.5,sr*0.13);ctx.stroke();

    // Nucleus (darker)
    if (sr>5) {
      ctx.beginPath();ctx.arc(sx+Math.sin(cell.phase*0.6)*sr*0.15,sy+Math.cos(cell.phase*0.6)*sr*0.15,sr*0.3,0,Math.PI*2);
      ctx.fillStyle=`hsla(${hue},${sat}%,${darkLit-3}%,0.55)`;ctx.fill();
    }

    if (t.flagella&&sr>4) {
      ctx.beginPath();ctx.moveTo(sx,sy);
      ctx.quadraticCurveTo(sx+Math.cos(cell.phase+0.9)*sr,sy+Math.sin(cell.phase+0.9)*sr,sx+Math.cos(cell.phase*1.8)*sr*3.2,sy+Math.sin(cell.phase*1.8)*sr*0.9);
      ctx.strokeStyle=`hsla(${hue},40%,${darkLit+12}%,0.45)`;ctx.lineWidth=Math.max(0.3,sr*0.07);ctx.stroke();
    }

    if (cell===selectedCell){ctx.beginPath();ctx.arc(sx,sy,sr+4,0,Math.PI*2);ctx.strokeStyle=`hsla(${hue},70%,18%,0.7)`;ctx.lineWidth=1;ctx.setLineDash([3,3]);ctx.stroke();ctx.setLineDash([]);}
  }
}

function draw() { if (fieldMode==='dark') drawDarkField(); else drawLightField(); }

function countColonies() {
  const seen=new Set();let n=0;
  for (const c of cells){if(seen.has(c))continue;if(c.bonds.length>0){const col=getColony(c);if(col.size>1){for(const m of col)seen.add(m);n++;}}}
  return n;
}

function updateHUD() {
  document.getElementById('stat-cells').textContent=cells.length;
  document.getElementById('stat-colonies').textContent=countColonies();
  document.getElementById('stat-nuts').textContent=nutrients.length;
  document.getElementById('stat-gen').textContent=maxGen;
  document.getElementById('stat-species').textContent=new Set(cells.map(c=>c.traits.lineage)).size;
  document.getElementById('stat-tick').textContent=tick;
}

function updateInspector() {
  const panel=document.getElementById('inspector');
  if(!selectedCell||!selectedCell.alive){panel.style.display='none';return;}
  panel.style.display='block';
  const t=selectedCell.traits;
  document.getElementById('ins-energy').textContent=selectedCell.energy.toFixed(1);
  document.getElementById('ins-age').textContent=selectedCell.age;
  document.getElementById('ins-gen').textContent=selectedCell.generation;
  document.getElementById('ins-shape').textContent=SHAPE_NAMES[t.shape];
  document.getElementById('ins-adh').textContent=['none','A','B','C'][t.adhesion];
  document.getElementById('ins-meta').textContent=t.metabolism.toFixed(2);
  document.getElementById('ins-cluster').textContent=getColony(selectedCell).size;
  document.getElementById('ins-genome').textContent=selectedCell.genome.toString(2).padStart(16,'0');
}

function loop() {
  requestAnimationFrame(loop);
  if (!paused){const steps=Math.round(simSpeed);for(let i=0;i<steps;i++)stepSim();}
  draw();
  if(tick%3===0)updateHUD();
  if(tick%8===0)updateInspector();
}

canvas.addEventListener('mousedown',e=>{
  if(e.button!==0)return;
  if(mode==='observe'){
    isDragging=true;dragStartX=e.clientX;dragStartY=e.clientY;dragVX=vx;dragVY=vy;
    const[wx,wy]=screenToWorld(e.clientX,e.clientY);let best=null,bd=Infinity;
    for(const cell of cells){const d=Math.sqrt((cell.x-wx)**2+(cell.y-wy)**2);if(d<cell.traits.radius+8&&d<bd){bd=d;best=cell;}}
    selectedCell=best;
  } else if(mode==='seed'){
    const[wx,wy]=screenToWorld(e.clientX,e.clientY);
    for(let i=0;i<6;i++)cells.push(makeCell(wx+(Math.random()-0.5)*35,wy+(Math.random()-0.5)*35));
  } else if(mode==='inject'){
    const[wx,wy]=screenToWorld(e.clientX,e.clientY);
    for(let i=0;i<35;i++)nutrients.push(makeNutrient(wx+(Math.random()-0.5)*70,wy+(Math.random()-0.5)*70));
  } else if(mode==='kill'){
    const[wx,wy]=screenToWorld(e.clientX,e.clientY);
    for(const c of cells)if(Math.sqrt((c.x-wx)**2+(c.y-wy)**2)<45)c.alive=false;
  }
});

canvas.addEventListener('mousemove',e=>{
  if(isDragging&&mode==='observe'){vx=dragVX-(e.clientX-dragStartX)/vscale;vy=dragVY-(e.clientY-dragStartY)/vscale;}
  if(e.buttons===1&&mode==='inject'&&Math.random()<0.35){
    const[wx,wy]=screenToWorld(e.clientX,e.clientY);
    for(let i=0;i<10;i++)nutrients.push(makeNutrient(wx+(Math.random()-0.5)*45,wy+(Math.random()-0.5)*45));
  }
  if(e.buttons===1&&mode==='kill'){
    const[wx,wy]=screenToWorld(e.clientX,e.clientY);
    for(const c of cells)if(Math.sqrt((c.x-wx)**2+(c.y-wy)**2)<32)c.alive=false;
  }
});
canvas.addEventListener('mouseup',()=>isDragging=false);

canvas.addEventListener('wheel',e=>{
  e.preventDefault();
  const factor=e.deltaY>0?0.85:1.18;
  const[wx,wy]=screenToWorld(e.clientX,e.clientY);
  vscale=Math.max(0.1,Math.min(14,vscale*factor));
  vx=wx-(e.clientX-W/2)/vscale;vy=wy-(e.clientY-H/2)/vscale;
},{passive:false});

let tSX,tSY,tVX,tVY,pD0,pS0;
canvas.addEventListener('touchstart',e=>{e.preventDefault();if(e.touches.length===1){tSX=e.touches[0].clientX;tSY=e.touches[0].clientY;tVX=vx;tVY=vy;}else if(e.touches.length===2){pD0=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);pS0=vscale;}},{passive:false});
canvas.addEventListener('touchmove',e=>{e.preventDefault();if(e.touches.length===1){vx=tVX-(e.touches[0].clientX-tSX)/vscale;vy=tVY-(e.touches[0].clientY-tSY)/vscale;}else if(e.touches.length===2){const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);vscale=Math.max(0.1,Math.min(14,pS0*d/pD0));}},{passive:false});

function setMode(m){
  mode=m;['observe','seed','inject','kill'].forEach(id=>{const b=document.getElementById('btn-'+id);if(b)b.classList.toggle('active',id===m);});
  canvas.style.cursor=m==='observe'?'crosshair':'cell';
}

function setField(f){
  fieldMode=f;
  document.getElementById('btn-dark').classList.toggle('active',f==='dark');
  document.getElementById('btn-light').classList.toggle('active',f==='light');
  document.body.style.background=f==='dark'?'#000':'#e8eeea';
  document.body.classList.toggle('lightfield',f==='light');
}

function togglePause(){paused=!paused;document.getElementById('btn-pause').textContent=paused?'Resume':'Pause';document.getElementById('btn-pause').classList.toggle('active',paused);}
function stepOnce(){paused=true;document.getElementById('btn-pause').textContent='Resume';stepSim();draw();}
function resetSim(){selectedCell=null;initSim();}
function setSpeed(s){simSpeed=s;['btn-slow','btn-normal','btn-fast','btn-vfast'].forEach(id=>document.getElementById(id).classList.remove('active'));const map={0.5:'btn-slow',1:'btn-normal',3:'btn-fast',8:'btn-vfast'};if(map[s])document.getElementById(map[s]).classList.add('active');}

initSim();
loop();
</script>
</body>
